frr defaults traditional
hostname hub-pe1
!
interface lo
 ip address 10.0.0.2/32
 ip ospf area 0
!
interface eth1
 description Link to branch-ce1
 ip address 10.1.1.2/30
 ip ospf network point-to-point
 ip ospf area 0
!
interface eth2
 description Link to core-p1
 ip address 10.1.2.1/30
 ip ospf network point-to-point
 ip ospf area 0
!
router ospf
 ospf router-id 10.0.0.2
!
line vty
!
