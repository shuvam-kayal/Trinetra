# strongSwan IPsec configuration file
config setup
    charondebug="ike 2, knl 2, cfg 2"

conn branch-to-hub
    authby=secret
    auto=route
    keyexchange=ikev2
    left=10.1.1.1
    leftsubnet=0.0.0.0/0
    right=10.1.1.2
    rightsubnet=0.0.0.0/0
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256!
    dpddelay=10s
    dpdtimeout=30s
    dpdaction=restart
